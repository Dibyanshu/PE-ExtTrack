name: Deploy Backend to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-vercel.yml'

concurrency:
  group: vercel-backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Check and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate required secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: $key"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck backend
        run: npm run --workspace @workspace/backend typecheck

      - name: Build backend
        run: npm run --workspace @workspace/backend build

      - name: Link Vercel project
        working-directory: backend
        shell: bash
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {
            "orgId": "${{ secrets.VERCEL_ORG_ID }}",
            "projectId": "${{ secrets.VERCEL_PROJECT_ID }}"
          }
          EOF

      - name: Pull Vercel environment
        working-directory: backend
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy backend
        working-directory: backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest deploy --prod --yes --token=${{ env.VERCEL_TOKEN }}